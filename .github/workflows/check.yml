name: CI — lint, typecheck, test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Audit production dependencies (informational)
        run: npm audit --omit=dev || true
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test -- --ci --maxWorkers=2
